name: Build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - Android
          - StandaloneWindows64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: 6000.3.18f1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
          retention-days: 14

      - name: Locate APK
        if: matrix.targetPlatform == 'Android'
        run: |
          apk=$(find build/Android -name '*.apk' | head -n 1)
          cp "$apk" Android.apk

      - name: Zip Windows build
        if: matrix.targetPlatform == 'StandaloneWindows64'
        run: |
          cd build/StandaloneWindows64/StandaloneWindows64
          zip -r ../../../Windows.zip .

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: Release-${{ matrix.targetPlatform }}
          path: ${{ matrix.targetPlatform == 'Android' && 'Android.apk' || 'Windows.zip' }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: Release-*
          merge-multiple: true

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Android.apk
            Windows.zip

      - name: Publish rolling latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            Android.apk
            Windows.zip
